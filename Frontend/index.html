<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Image Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>AI-Generated Image Detector</h1>
    <p class="subtitle">Upload an image to check whether it is real or AI-generated.</p>

    <div class="upload-box">
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="predictImage()">Analyze Image</button>
    </div>

    <div class="preview-section">
        <div>
            <h3>Uploaded Image</h3>
            <img id="previewImage" class="image-box">
        </div>

        <div>
            <h3>Grad-CAM Explanation</h3>
            <img id="gradcamImage" class="image-box">
        </div>
    </div>

    <div id="resultBox" class="result-box hidden">
        <h2 id="predictionText"></h2>
        <p id="confidenceText"></p>

        <div class="bar-container">
            <label>Real Probability</label>
            <div class="bar">
                <div id="realBar" class="real-bar"></div>
            </div>

            <label>AI Probability</label>
            <div class="bar">
                <div id="fakeBar" class="fake-bar"></div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
